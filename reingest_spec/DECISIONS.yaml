preflight_full_reingest:
  blockers_must_resolve_before_kickoff: 7
  status: NOT_READY  # Set 5 panel showed G1 raw 0.84 / G2 broken / G3 broken / G4 24% refusal

  defect_D_shared_pdf:
    description: "CGST-Rules-2017-Part-B-Forms.pdf referenced by ~50 form doc_ids; chunker re-reads whole PDF per doc_id, dedup zeros all but first. Drags raw G1 from ~0.96 to ~0.84."
    fix: "patch chunker_v2 to scope offsets per doc_id; pre-flight count of shared-PDF docs in 14925 corpus mandatory"

  reranker_integration:
    model: "/opt/indian-legal-ai/models/bge-reranker-v2-m3-Q4_K_M.gguf"
    motivation: "G4 separability: gold band [0.51-0.82] overlaps adversarial [0.42-0.74]. Dense-only retrieve cannot distinguish."
    decision: "wire into /retrieve, re-tune theta_v2.json post-rerank scoring"
    blocking: ["gate_G4", "theta_v2_feasibility"]

  embed_pool_validation:
    current_codified: "EMBED_GPUS=4,5,6"
    observed_2026_04_25: "under gate load GPU 4=99%, GPU 5/6=0% — pool not concurrency-balanced"
    required_benches:
      - "solo Vulkan BGE-M3 throughput on GPUs 0, 1, 3 individually (post-reset)"
      - "4-card pools {0,4,5,6} {1,4,5,6} {3,4,5,6}"
      - "verify embedder_direct.py worker fan-out actually round-robins under burst"
    accept_if: "throughput >= 22 ch/s stable, zero VK_DEVICE_LOST in 30-min under-load run"

  gate_concurrency:
    codified_lesson: "4 gates parallel against single API → /retrieve degrades 2.4s → 9s, /query times out at 60s"
    mitigation_required_before_production: "EITHER serialize gate panel OR stand up second API instance bound to separate embed pool"

  phase6_patches_required:
    summary_writer: "summary.json didn't fire on last 200-doc test — fix"
    hard_cap_per_chunk: 12
    observed_outliers:
      - "cbic-allied-act-dtls:1000201 emitted 48 qwen3 pairs"
      - "cbic-others-document-msts:1000038 emitted 49 qwen3 pairs"

  gate_code_patches_2026_04_25:
    g3_levenshtein:
      change: "accept singular gold keys (expected_chunk_id/expected_doc_id/expected_section) in addition to plural"
      reason: "Set 5 hand-authored gold uses singular; full pipeline gold uses plural"
    g4_adversarial:
      change: "API endpoint flipped /query -> /retrieve"
      reason: "/query overloaded under concurrent gate load; G4 only needs top retrieve score vs theta"

  embed_pool_pcie_reset_lesson:
    date: 2026-04-25
    finding: "Per-card PCIe bus reset (echo 1 > /sys/class/drm/cardN/device/reset) is NOT safe on this rig. Resetting a subset of cards disturbs upstream PCIe switch state and breaks previously-healthy cards."
    evidence:
      - "Pre-reset baseline: GPUs 0,1,3 healthy ~25 q/s solo; 4,5,6 degraded ~0.44 q/s"
      - "After echo 1 > reset on cards 4,5,6: GPUs 0,1 (full BAR, prior 26s load) timed out at 120s; GPU 3,6 timed out at 300s; only 4,5 came up"
      - "Net regression: from 3 healthy GPUs to 2 healthy GPUs"
    rule_NEW: "Never PCIe-reset a partial set of GPUs while others are loaded or about to load. Either (a) reset NOTHING and live with degraded cards, or (b) full system reboot."
    pre_pool_protocol_chosen: "cold reboot before any 6-GPU pool start. No per-card reset in production scripts."
    weighted_deficit_scheduler_required: "Equal-weight RR funnels 99% of calls to fastest GPU when warmup latencies differ. Disable rebalance_after_warmup until weighted-deficit scheduler ships."

  embed_pool_concurrent_load_lesson:
    date: 2026-04-25
    re_discovery: true
    user_note: 'this is another lesson we learned long time ago that never load the cards in one go at least like 6 cards at a time. may be 2 cards at a time. otherwise they create problems'
    finding: 'Concurrent cold-load of llama-cpp-python Vulkan workers across all 6 embed GPUs causes Vulkan-init contention. Weaker cards time out, stronger cards degrade ~16x.'
    evidence:
      - 'GPU 1 solo cold-load: 2.8s ready'
      - 'GPU 6 solo cold-load: 2.7s ready'
      - 'GPU 1 in 6-card concurrent: TIMEOUT 120s'
      - 'GPU 6 in 6-card concurrent: TIMEOUT 300s'
      - 'Surviving 4 cards in 6-card concurrent: 45-48s each (vs 2.8s solo)'
    rule_NEW: 'Never cold-load more than 2 GPU cards concurrently on this rig. Default is strict 1-at-a-time.'
    implementation:
      profile_knob: 'embed_pool_profiles.json#sequential_cold_load (default true)'
      gap_s: 0.5
      code_location: 'embedder_direct.py _Pool.__init__'
      max_in_flight_upper_bound: 2
    expected_total_cold_start: '~20s for all 6 cards'

# ---------------------------------------------------------------------------
# 2026-04-25 (later 9) — Groundedness architecture (G4 pivot)
# ---------------------------------------------------------------------------
groundedness_architecture:
  date: 2026-04-25
  status: validated_set5_lenient
  motivation: |
    theta-tune at 0.95/0.95 INFEASIBLE on cbic_v2_set5_dfix x clean adv v2.
    Bands overlap irreducibly because OOC adversarials share lexical surface
    with CBIC chunks (TDS, capital gains, notification, penalty). Scalar
    refusal cannot resolve a semantic distinction.
  primitive: |
    qwen3-14b judges {question, top-3 reranked chunks} -> yes|partial|no.
    Refuse on no (lenient) or no+partial (strict).
  why_not_topic_classifier: |
    User correctly observed CBIC corpus is intentionally cross-statute
    (TDS-under-GST, transfer pricing JWG, PAN cross-refs, allied_acts).
    A 'is this CBIC?' classifier would false-positive-refuse legitimate
    cross-statute queries. Manifest scan: 11+ docs explicitly cross-ref
    Income Tax Act inside CBIC. The right primitive is corpus-intrinsic
    groundedness, not topic taxonomy.
  generalization: |
    Corpus-intrinsic. No taxonomy, no per-corpus tuning. Same primitive
    scales unchanged from Set 5 (100 docs) to full 14,925-doc corpus.
  validation:
    collection: cbic_v2_set5_dfix
    adv_set: eval/v2_adversarial_clean_v2.json
    n: 201
    lenient_refusal_rate: 0.9851   # --refuse-on no
    strict_refusal_rate: 1.0000    # --refuse-on no_or_partial
    leaks_lenient: 3   # all 'partial' on genuinely OOC queries (income-tax x2, MCA x1)
    leaks_strict: 0
    yes_verdicts_on_ooc: 0   # qwen3 never falsely confirmed groundedness on any OOC query
    errors: 0
    pass_lenient: true
    pass_strict: true
    pass_threshold: 0.95
  files:
    module: rag/cbic_rag/groundedness.py
    api_patch: rag/cbic_rag/api.py  # _call_llm_short + retrieve_only grounded path
    gate: reingest_spec/evaluators/gate_g4_grounded.py
    result: reingest_spec/evaluators/gate_g4_grounded_set5_dfix.json
  latency_ms_per_query: 3000-3500
  prompt_budget:
    top_k_chunks: 3
    chars_per_chunk: 500
    max_output_tokens: 60
  no_proxy_compliance:
    status: DONE_2026_04_26
    change: |
      api.py _call_llm_short() now calls direct llama-server :9082 instead of
      LITELLM_URL gateway. Three new env vars: GROUNDED_LLM_URL (default
      http://127.0.0.1:9082), GROUNDED_LLM_MODEL (default qwen3-14b-q4_k_m.gguf,
      verified via /v1/models on the live llama-server), GROUNDED_LLM_KEY.
    smoke_test:
      query: "How do I file MGT-7 with the ROC?"
      result: "grounded=no | 3350ms | reason='Evidence relates to GST forms and procedures, not MGT-7 or ROC filings.'"
    deployment: "synced rig + Windows; cbic-rag-api restarted; AST OK; live verified"
    /query_path_status: "_call_llm() (used by /query) MIGRATED 2026-04-26 — now defaults to direct llama-server :9082 via LLM_DIRECT_URL/MODEL/KEY envs. To re-enable proxy: set LLM_DIRECT_URL=$LITELLM_URL and LLM_DIRECT_MODEL=qwen3-14b-hermes."
    /query_smoke_test_2026_04_26:
      query: "What is the rate of GST on services?"
      total_ms: 21986
      llm_ms: 20554
      retrieve_ms: 56
      rerank_ms: 1375
      answer_markdown_present: true
      result: "PASS — direct path works end-to-end on /query"

