# ---------------------------------------------------------------------------
# 2026-04-25 (later 9) — Gold-side sanity test: groundedness false-positive analysis
# ---------------------------------------------------------------------------
groundedness_gold_sanity_2026_04_25:
  collection: cbic_v2_set5_dfix
  sample: 50 random gold queries from eval/scale_sets/set5/v2_gold_set5_reachable.json
  refuse_on: no   # lenient mode
  results:
    yes: 12       # 24%  groundedness confirms answerable
    partial: 21   # 42%  some evidence, charitable
    no: 17        # 34%  refused (refusal_rate=0.34 on gold)
  interpretation: |
    Inspection of the 17 "no" verdicts shows the reasons are technically
    CORRECT — qwen3 honestly reports that the retrieved top-3 chunks do
    not contain the answer, even though the answer EXISTS somewhere in
    the corpus. Examples:
      - gold_0 anti-dumping: retrieved chunks unrelated (correct call)
      - gold_8 notification 3 specific items: notification surfaced but
        not the amendment list (correct call)
      - gold_12 AY 2014-15 set-off: retrieved AY 2018-19 rules (correct call)
      - gold_16 Ongole exports: retrieved chunks don't mention Ongole (correct call)
    These are RETRIEVAL FAILURES, not groundedness failures. The right
    chunks are not in top-3 reranked.
  conclusion: |
    Groundedness is functioning correctly. The 34% gold "no" rate equals
    the chunking/retrieval ceiling on Set 5 (already documented). Improving
    retrieval (wider top_K to groundedness, hybrid BM25+RRF, query rewrite,
    better chunker pass-2 boundaries) will reduce gold refusal toward zero
    WITHOUT changing the groundedness primitive.
  mitigation_options:
    A_widen_groundedness_top_k:
      change: "top_k_chunks 3 -> 5 in groundedness._build_user_prompt"
      cost: "+~50% prompt tokens, +~30% latency (~3.5s -> ~5s)"
      risk: low
    B_hybrid_BM25_RRF:
      change: "add BM25 to retrieval, RRF-fuse with dense+rerank"
      cost: medium engineering, retrieval pipeline change
      risk: medium
    C_query_rewrite_pre_retrieval:
      change: "qwen3 expands user query into 2-3 rephrases, fan-out retrieve"
      cost: "+~3s per query (one extra qwen3 round)"
      risk: low
    D_chunker_v3_pass_2_revisions:
      change: "improve sentence-boundary detection on circulars/notifications/forms"
      cost: high (chunker rewrite + re-ingest)
      risk: medium
  next_step: "after full re-ingest measure gold refusal on real corpus; tune from there"
  not_blocking_set5_validation: true   # adversarial gate passes; gold ceiling is pre-existing chunking issue

