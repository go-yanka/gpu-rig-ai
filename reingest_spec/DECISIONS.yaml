    F1_section_bounded_megachunk:
      file: reingest_spec/chunker_v2.py
      function: _section_bounded_split
      symptom: |
        cbic-notification-msts:1005850 — 7,087-char anti-dumping body emitted
        as one chunk, dilutes rerank signal across full doc.
      root_cause: |
        Single-chunk-emission threshold was CEILING (8000 chars), letting
        sections up to 8K stay mono-chunk despite TARGET=3500.
      fix: |
        Lower threshold to int(TARGET * 1.5) = 5250. Sections > 5250 fall
        through to existing semantic_pts + subnumeric sub-split path.
      sanity_test: 1_chunk_to_4_chunks_2914_5217_7593_8076
    F2_prose_span_tail_duplicate:
      file: reingest_spec/chunker_v2.py
      function: _chunk_prose_span
      symptom: |
        cbic-notification-msts:1008760 — chunks [7662:8699] and [7999:8699]
        both R5:mid_700; second chunk's range is 100% inside first.
      root_cause: |
        Loop continues after adj_end == N with next_cur = N - OVERLAP_MID,
        emitting a chunk whose text is the previous chunk's overlap window.
      fix: |
        Add `if adj_end >= N: break` after chunk append. Already-existing
        `next_cur <= cur` safety only catches backwards moves.
      sanity_test: 4_chunks_to_3_chunks_no_overlap
