# CBIC RAG v2 — Frozen Decisions (single source of truth)
#
# Every script that generates eval data, ingests, embeds, chunks, or evaluates
# MUST read this file before defaulting any value. The PreToolUse hook
# (scripts/hook_decision_check.py) greps this file for keywords from the
# task and injects matches into the agent context to prevent default-by-
# omission drift.
#
# Append-only with date + initials. To revise a decision, ADD a new entry
# with status: superseded on the old one and a new entry with the change.
# Never silently mutate.

schema_version: 1

# ---------------------------------------------------------------------------
# Chunker (LOCKED 2026-04-25 after 5-set / 292-doc / 1774-query validation)
# ---------------------------------------------------------------------------
chunker:
  status: locked
  date: 2026-04-25
  recipe_file: reingest_spec/chunker_v2.py
  pass1_classifier:
    primary: qwen3-14b
    endpoint: http://127.0.0.1:9082/v1
    bypass_prefixes: [cbic-form-msts, cbic-instruction-msts, cbic-attachment-dtls,
                      cbic-circular-msts, cbic-notification-msts, cbic-rule-msts,
                      cbic-order-msts, cbic-regulation-doc-msts,
                      cbic-others-document-msts, cbic-allied-act-dtls,
                      cbic-act-msts, cbic-regulation-msts]
    bypass_prefixes_status_2026_04_26: APPROVED_FOR_FULL_REINGEST
    bypass_prefixes_evidence: |
      Set 5 chunkfix (94 docs) + Set 6 (294 docs) both ran with all 12 prefixes
      bypassing qwen3 to deterministic _DEFAULT_PLANS_BY_PREFIX. Result on Set 5:
      G3 retrieve-only 37/37=1.000 PASS, G4 grounded strict 201/201=1.000 PASS.
      Deterministic templates retrieve as well or better than qwen3 per-doc plans
      because CBIC structured doc types (notification/circular/order/etc.) have
      regular Section/Para schemas that the templates encode correctly once.
      Time saved at full corpus: ~6.5h phase-2 (15K docs * 1.5s qwen3 -> 0.05s
      bypass). Quality net-positive. Future-unseen prefixes still go to qwen3
      with /no_think + max_tokens=512 + classify_latency_slo preflight.
    fallback: _DEFAULT_PLANS_BY_PREFIX (12 prefixes + _GENERIC_)
    max_tokens: 512  # was 4096, reduced 2026-04-26 (see classify_latency_slo)
    timeout_s: 180
    retries: 3
  pass2_splitter: rule-driven (section/rule/paragraph by Pass-1 plan)
  defects_resolved: [A_qwen_timeout, B_table_regions_null, C_repetition_trap]
  defects_deferred:
    D_shared_pdf:
      desc: "~50 form doc_ids share CGST-Rules-2017-Part-B-Forms.pdf"
      affected_pct: 2.5
      threshold: 5.0
      cleared_full_reingest: true
    E_form_semantic_gap:
      desc: form-field labels do not match scenario-style queries
      mitigation: retrieval-side (BM25+RRF or query rewrite) post-ingest

# ---------------------------------------------------------------------------
# Embed / Ingest environment (LOCKED 2026-04-24)
# ---------------------------------------------------------------------------
embed:
  embedder: BGE-M3 via llama-cpp-python (Vulkan)
  embed_gpus: "4,5,6"
  forbidden_gpus: [0, 1]
  mandatory_env:
    DENSE_ONLY: "1"
    EMBED_GPUS: "4,5,6"
    RADV_DEBUG: nodcc
    GGML_VK_DISABLE_INTEGER_DOT_PRODUCT: "1"
  forbidden_flags: [--flash-attn, --mlock]
  cpu_forbidden: true

# ---------------------------------------------------------------------------
# Pair generation (phase6_pairs) — LOCKED 2026-04-25
# ---------------------------------------------------------------------------
pair_generation:
  status: locked
  date: 2026-04-25
  decided_by: user_directive_2026-04-25
  output_canonical: /opt/indian-legal-ai/data/training_corpus/cbic_pairs_v2.jsonl
  output_per_scope_template: /opt/indian-legal-ai/data/training_corpus/cbic_pairs_v2_{scope}_{yyyymmdd}.jsonl
  schema_doc: ~/.claude/projects/D---gpu-rig-ai/memory/pair_schema_cbic_v2.md
  cardinality_per_chunk: 12
  generator_mix: B  # qwen3 primary + 20% Gemini Flash + Claude CLI for adversarial
  generators:
    primary:
      model: qwen3-14b
      endpoint: http://127.0.0.1:9082/v1
      coverage: "100% of chunks"
      queries_per_chunk: 12
      query_types: [factual, scenario, definition, procedural, edge_case, multi_hop]
    diversity:
      model: gemini-flash
      via: GEMINI_API_KEY (sourced from D:/_gpu_rig_ai/.env)
      coverage: "every 5th chunk (deterministic by hash(chunk_id) % 5 == 0)"
      queries_per_chunk: 4
      query_types: [scenario, multi_hop]
      budget_cap_usd: 100
    adversarial:
      tool: claude -p (rig CLI /usr/bin/claude)
      notes: 'backed by Claude Max plan subscription — free at margin, NOT API-metered. Do not re-debate cost.'
      coverage: "every 10th chunk (deterministic by hash(chunk_id) % 10 == 0)"
      queries_per_chunk: 2
      query_types: [refusal_bait, out_of_scope, near_miss]
  hard_negatives:
    mode: inline
    method: cosine-band-mining over same-doc chunks
    similarity_band: [0.60, 0.85]
    k: 5
  set5_backfill: skip
  applies_to: [future_sets, full_reingest]
  reporting:
    # 2026-04-25: user directive — phase6 must emit per-doc + total pair counts
    # at end of every run, separately by generator. Not just an aggregate. This
    # is the audit trail the user uses to spot under-generation on specific
    # doc types (e.g. forms with rigid structure may yield fewer scenario qs).
    per_doc_required: true
    per_generator_required: true
    summary_file: /opt/indian-legal-ai/data/training_corpus/cbic_pairs_v2_{scope}_{yyyymmdd}.summary.json

# ---------------------------------------------------------------------------
# G-gate suite (must all run per cohort)
# ---------------------------------------------------------------------------
gates:
  G1_recall_at_10:
    threshold: 0.95
    metric: adjusted (excludes shared-PDF Defect D misses)
    gold_source: "union(generated_pairs_for_scope, legacy_pool_filtered_to_scope)"
  G2_dual_judge:
    judges: [gemini-flash, claude-cli]
    threshold: 0.95
    metric: faithfulness + groundedness pass rate
  G3_answer_quality:
    threshold: 0.95
    # 2026-04-26 (later 2): cbic_v2_set5_dfix run, n=37 set5-overlap gold queries.
    # combined_recall=0.9459 (35/37 g1_hits, 0 g3_near_misses). FAIL by 1 query.
    # 2026-04-26 (later 3): root cause of both misses isolated to chunker_v2 —
    # NOT a G3 logic problem. See chunker_defect_F below. Patches applied to
    # chunker_v2.py; re-ingest of Set 5 + G3 re-run pending.
    evaluator: reingest_spec/evaluators/gate_g3_levenshtein.py
    set5_dfix_result: reingest_spec/evaluators/gate_g3_set5_dfix_result.json
    status_2026_04_26: chunker_patched_pending_reingest
  G4_adversarial_refusal:
    threshold: 0.95   # 2026-04-25 (later 9): bumped 0.90 -> 0.95 after groundedness pivot
    metric: correct refusal on out-of-scope and refusal-bait queries
    # 2026-04-25 (later 9): mechanism = groundedness check (qwen3 verdict on top-K reranked
    # chunks), NOT scalar theta on rerank score. theta on rerank stays as a coarse pre-filter
    # (default 0.55) but the gate is the corpus-intrinsic verdict yes/partial/no.
    # Rationale: cross-statute CBIC content (TDS-under-GST, transfer pricing JWG, PAN cross-refs)
    # makes a topic classifier wrong by construction; scalar theta cannot separate
    # vocabulary-share from genuine evidence. Validated cbic_v2_set5_dfix x clean adv v2 (n=201):
    # refusal 0.9851 lenient. See JOURNAL 2026-04-25 (later 9).
    refuse_on: no_or_partial   # strict default; 'no' is lenient mode
    evaluator: reingest_spec/evaluators/gate_g4_grounded.py
    module: rag/cbic_rag/groundedness.py
    api_field: "POST /retrieve {grounded:true} -> {grounded, grounded_reason, grounded_ms}"
  G5_latency_cost:
    p95_latency_s: 15        # 2026-04-26 amended 8 -> 15 (user-approved)
    p95_latency_s_original: 8  # frozen-spec value, retained for audit
    cost_per_query_usd: 0.01
    # 2026-04-26 (later 2): NEW evaluator gate_g5_latency_cost.py.
    # Result on cbic_v2_set5_dfix n=37 with grounded /query, workers=1:
    #   p50=46.7s, p95=70.1s, p99=86.7s, max=86.7s
    #   avg_cost_usd=0.0 (local qwen3, no proxies)
    #   pass_gate=false (latency FAIL ~9x, cost PASS)
    # Diagnosis: LLM answer (max_tokens=900) on qwen3-14b Q4_K_M Vulkan single-slot
    # = 45-90s alone. Groundedness adds 3.3s floor. Frozen 8s threshold predates
    # the groundedness step and is no longer architecture-compatible.
    evaluator: reingest_spec/evaluators/gate_g5_latency_cost.py
    set5_dfix_result: reingest_spec/evaluators/gate_g5_set5_dfix_result.json
    spec_amendment_needed: true
    options_to_pass:
      - id: shorten_max_tokens
        action: "_call_llm max_tokens 900 -> 250"
        expected_p95_s: 15-20
        cost: low
        side_effect: truncated answers
      - id: streaming_early_stop
        action: "stream emission, terminate after Answer block + supporting passages"
        expected_p95_s: 10-15
        cost: 1-2_days
      - id: switch_smaller_model
        action: "qwen3-14b -> qwen3-8b"
        expected_p95_s: 8-12
        cost: medium
        side_effect: lose CBIC quality
      - id: second_qwen3_gpu3_rr
        action: "stand up :9083 on GPU 3, in-process round-robin"
        expected_p95_s: 70  # unchanged - throughput only
        cost: medium
        side_effect: doubles throughput, does not help single-query latency
      - id: spec_amendment
        action: "raise p95 threshold from 8s to 12-15s for grounded /query path"
        expected_p95_s: 12-15
        cost: low
        side_effect: needs SPEC.md edit + user OK
        recommended: true
    status_2026_04_26: failing_pending_spec_decision
    status_2026_04_26_later4: AMENDED_8s_to_15s_USER_APPROVED
    amendment_rationale: |
      qwen3-14b Q4_K_M Vulkan single-slot has a hard floor of ~45s for a
      max_tokens=900 answer regardless of GPU count. Multi-GPU helps THROUGHPUT
      not single-query latency (codified standing rule). Original 8s threshold
      predated groundedness gate (which adds 3.3s floor). Amending to 15s
      preserves the latency contract while reflecting actual single-slot
      generation cost. Cost contract ($0.01/query) unchanged — local qwen3
      is $0/query so cost gate continues to PASS trivially.
    next_step: regenerate_g5_against_set5_chunkfix_with_15s_threshold

