# G2 dual-judge strategy (CODIFIED 2026-04-26 later 5)
# ---------------------------------------------------------------------------
g2_strategy:
  status: approved
  date: 2026-04-26
  what_g2_measures: |
    Given question+retrieved-chunks+generated-answer, do BOTH Gemini-Flash
    AND Claude-Sonnet judge the answer faithful to the chunks. Threshold:
    >=0.95 dual-judge agreement on faithful.
  tiers:
    tier1_lite:
      when: "during set verification, smoke test"
      sample: "n=50 random subset of set gold"
      cost_usd: 0.5
      purpose: "catch egregious hallucination, NOT a 95% gate"
      run_alone: true
    tier2_full:
      when: "final pre-launch on largest stable set, Set 6 n=380"
      sample: "n=380 entire v2_gold_set6"
      cost_usd: 4.0
      purpose: "real 95% measurement, Wilson 95 percent CI 0.926-0.972 at p=0.95"
      run_alone: true
      runs_after: [G1, G3, G4]
    tier3_sample:
      when: "post full re-ingest into cbic_v2 14925 docs"
      sample: "n=200 stratified from full gold corpus"
      cost_usd: 2.0
      purpose: "confirm faithfulness holds at corpus scale"
      run_alone: true
  hard_rules:
    - "G2 cannot run concurrently with G3 or G4, codified gate-concurrency rule"
    - "G2 calls /query LLM-bound 45-90s, plan 90-120 min wall-clock for n=380"
    - "Use direct llama-server, no LiteLLM proxy, codified no_proxy rule"

