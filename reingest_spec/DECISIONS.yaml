# ===== 2026-04-26 (later 6) — FULL RE-INGEST CHECKPOINT POLICY =====
full_reingest_checkpoint_policy:
  status: APPROVED_2026_04_26
  rationale: |
    Per Hard Rule #1 (95% non-negotiable, no patch-and-continue) we cannot
    accept ±5% drift "to keep moving". But running full gate panel after
    every batch is wasteful: (a) batches are deterministic disjoint picks
    so per-batch quality variance is structurally zero — drift only
    surfaces at corpus-density scale; (b) G2 dual-judge n=380 ~$4/run ×
    10 batches = $40 wasted; (c) gates serialize against ingest API.
    Compromise: 3 strategic checkpoints.
  checkpoints:
    CP1_pipeline_smoke:
      after_batch: 1
      runs:
        - G3_grounded on Set 6 gold subset overlapping batch-1 doc_ids
        - G4_grounded on Set 6 adv (n=201)
        - 5 hand-picked /query smokes (notification, circular, act, rule, form, instruction)
      pass:
        - G3 >= 0.90
        - G4 >= 0.95
        - all 5 /query smokes return correct top-1 doc_id
      stop_condition_HARD: G3 < 0.90 OR G4 < 0.95
      time_budget_min: 10
      cost_usd: 0
    CP2_mid_corpus_drift:
      after_batch: 5
      runs:
        - G1_recall on union(Set 5, Set 6) gold against partial cbic_v2
        - G3_grounded on union gold
        - G4_grounded on clean adv v2
        - reranker_score_histogram check (gold p50 >= 0.7, adv max < 0.65)
      pass:
        - G1 >= 0.95
        - G3 >= 0.92
        - G4 >= 0.95
        - histogram bands cleanly separated (per codified separation rule)
      stop_condition_HARD: G1 < 0.95 OR G3 < 0.92 OR G4 < 0.95 OR bands_overlap
      time_budget_min: 15
      cost_usd: 0
      likely_root_causes_if_fail: [chunker_density_bug, reranker_context_bleed, theta_drift]
    CP3_final_acceptance:
      after_batch: 10
      runs:
        - G1_recall_full
        - G2_dual_judge_full_n_380
        - G3_grounded_full
        - G4_grounded_full
        - G5_latency_cost
      pass:
        - G1 >= 0.95
        - G2 >= 0.95
        - G3 >= 0.95
        - G4 >= 0.95
        - G5 p95 within current spec amendment (12-15s)
      stop_condition_HARD: ANY_GATE < 0.95
      on_fail: HALT, fix spec, full re-run from failed phase. NO PROMOTION until all green.
      time_budget_min: 45
      cost_usd: 4   # G2 dual-judge Gemini + Claude
  per_batch_logging:
    file: reingest_spec/INGEST_TRACKER.md
    what: |
      Every batch updates one row of the batch table with: status,
      Phase 2 wall-clock, Phase 3-5 wall-clock, total minutes, qdrant
      points_count after batch, gate values at the next checkpoint
      (G1/G3/G4/G2/G5), CP marker, free-text notes.

# ===== 2026-04-26 (later 6) — NAN/INF SAFETY PATCHES =====
ingest_pipeline_nan_safety:
  status: DEPLOYED_2026_04_26
  origin: |
    Batch 1 attempt #1 crashed at chunk 2880/4242 with Qdrant 400
    "Format error in JSON body: expected ',' or ']' at line 1 column 219103".
    Root cause (high confidence): NaN/Inf in dense BGE-M3 or sparse BM25
    vector. Python JSON encoder emits bare NaN/Infinity tokens which
    Qdrant strict parser rejects.
  patches:
    upsert_chunks_sanitiser:
      file: rag/cbic_rag/ingest.py
      change: |
        Replaced loose float(x) calls with per-element finite check via
        new _finite() helper. Non-finite values clamped to 0.0 with
        per-point logging (pid, field, idx, raw value); summary count
        printed if > 10 occurrences. Surfaces silently-bad embeds for
        downstream chunker/embedder fixes without killing the batch.
      lines: ~140-180 of ingest.py post-patch
    flush_batch_halve_and_retry:
      file: reingest_spec/ingest_v2.py
      change: |
        On qdrant_client UnexpectedResponse(status=400), recursively
        halve the buffer until a single bad point is isolated; log
        chunk_id + doc_id; mark surviving points as upserted; continue
        rather than crashing the entire batch.
      lines: ~958-1000 post-patch
  standing_rule: |
    All future vector→Qdrant pipelines on this rig MUST sanitise
    non-finite floats before serialization. The lesson: silent embed
    failures (BM25 normalize-to-zero, dense overflow) become catastrophic
    Qdrant 400s. Sanitise at the boundary, log+isolate, never propagate.

