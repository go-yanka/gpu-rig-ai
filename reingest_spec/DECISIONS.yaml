gpu_power_state_on_boot_2026_05_07:
  status: VERIFIED_AND_PERMANENTLY_FIXED
  symptom: yesterday qwen3-14b on GPU 2 measured 104s per 10 tokens, both via HTTP and direct in-process llama-cpp-python
  root_cause: |
    qwen3-14b.service auto-starts on boot via WantedBy=multi-user.target.
    After boot, power_dpm_force_performance_level defaults to auto (low when idle).
    llama-server invokes the GPU before any compute, GPU stays in low power, model
    loads at low clocks, never escapes. Direct in-process had same bug because
    llama-cpp-python calls the same Vulkan layer hitting the same idle GPU.
  permanent_fix:
    qwen3_14b_drop_in: /etc/systemd/system/qwen3-14b.service.d/power_dpm.conf
    bge_reranker_drop_in: /etc/systemd/system/bge-reranker.service.d/power_dpm.conf
    contents: ExecStartPre forces echo high to power_dpm_force_performance_level + sleep 2
    mirrored_to: D:/_gpu_rig_ai/reingest_spec/systemd/{qwen3-14b,bge-reranker}.service.d/power_dpm.conf
  bench_post_fix:
    direct_in_process: 27.4 tok/s (warm 364ms / 10 tokens)
    http_llama_server: 36.14 tok/s (180-352ms / 5 tokens)
  standing_rule: any new GPU-using systemd service must add equivalent ExecStartPre
  navigation_quirk: |
    RX 6700 XT (NAVI22) shows pp_dpm_sclk = "0Mhz *" even when working —
    kernel quirk, not degradation. Trust pp_dpm_mclk and actual inference benchmark.

