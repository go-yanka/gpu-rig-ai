# ============================================================================
# 2026-04-26: classify-latency SLO codified after Set 5 chunkfix re-ingest
# stalled at 130min/100 docs. Permanent fail-loud preflight added to ingest_v2.
# ============================================================================
classify_latency_slo:
  status: ENFORCED_2026_04_26
  rule: "qwen3 classify-shape preflight call MUST complete in <=15s; else ingest aborts"
  why_codified: |
    Codification covers KNOB VALUES (max_tokens=4096, /no_think prefix, etc.)
    but DID NOT cover PERFORMANCE CONTRACTS (per-call wall-clock budget).
    Each max_tokens bump (200->1024->2048->4096) was reactive to a truncation
    defect, comment-justified, but nobody re-measured phase-2 wall-clock.
    Result: qwen3 silently reasoned ~2400 tokens/call at 30 tok/s = 80s/call,
    pushing phase 2 from 5min to 130min on Set 5 chunkfix. Slipped past every
    code review because there was no SLO to violate.
  hidden_gap_discovered:
    issue: "/no_think prefix has NO EFFECT on /v1/completions endpoint"
    explanation: |
      /no_think is a chat-template directive parsed by the qwen3-unsloth.jinja
      template ONLY when invoked via /v1/chat/completions. On the raw
      /v1/completions endpoint (which classify_doc_qwen uses), it is literal
      prompt text qwen3 ignores. So qwen3 reasons by default regardless of the
      prefix. Comment in chunker_v2.py implied /no_think was active; code
      reviewers (incl me) trusted the comment without empirical check.
    fix_applied:
      - chunker_v2.py classify_doc_qwen max_tokens 4096 -> 512 (caps damage)
    fix_pending_followup:
      - switch classify_doc_qwen to /v1/chat/completions for /no_think to actually fire
      - or inject "</think>" empty-think tags after prompt as a /v1/completions hack
  preflight_check:
    function: ingest_v2.py:_preflight_classify_latency_slo
    invocation: run_preflight() — between qwen3_warmup and hello_world_embed
    parameters:
      max_tokens: 512
      p95_budget_s: 15.0
      timeout: 30
    behavior: |
      Sends a realistic phase-2-shape classify request, times wall-clock,
      raises RuntimeError if elapsed > 15s. Phase 2 budget is ~5min for
      100 docs = ~3s/call median; 15s is a safety ceiling that catches
      severe regressions while tolerating cold-cache jitter.
  failure_message_includes:
    - elapsed_seconds
    - extrapolated_minutes_for_100_docs
    - likely_causes (max_tokens too high, /no_think not active, qwen3 degraded)
    - tokens_emitted (diagnostic for thinking-mode regression)
  standing_rule: |
    Whenever any LLM call is added to ANY phase of the ingest pipeline:
    1. Define a per-call wall-clock SLO in DECISIONS.yaml
    2. Add a preflight assertion that fails the run if SLO is violated
    3. Re-measure on a representative sample after every prompt/max_tokens/
       endpoint change
    Codified to prevent recurrence — user-stated 2026-04-26: "I will not
    accept this again". Future Claudes: if you bump max_tokens or change
    classify endpoint, run the preflight standalone and confirm <=15s
    BEFORE launching a multi-hour ingest.

