# gold_set_tariff.yaml — 10 rate-lookup gold items for A4 (tariff pipeline).
# Kept separate from gold_set.yaml (which stays at 50 Qs for A0 baseline comparability).
# `expected_rate_igst_any_of` values are realistic candidates; fill exact ground truth
# after first real ingest of notification 1/2017-CT(Rate) + updates.

- id: rate_hsn_001
  category: tariff
  difficulty: basic
  question: "What is the GST rate on HSN 8471?"
  expected_hsn: "8471"
  expected_rate_igst_any_of: [18.0]
  expected_notification_any_of: ["1/2017-CT(Rate)"]
  must_cite_verbatim: false
  notes: "Automatic data processing machines (computers)."

