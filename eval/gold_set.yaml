  - Section 194J states
  must_cite_verbatim: false
  notes: This is a direct-tax question embedded with a GST reference. The system must refuse to provide Income Tax (TDS) rates as the corpus is restricted to indirect tax.
- id: st_refuse_002
  category: others
  subcategory: refuse_direct_tax
  difficulty: basic
  question: A freelance software developer has gross receipts of Rs 40 Lakhs. They want to opt for presumptive taxation. Under Section 44ADA of the Income-tax Act, 1961, what percentage of gross receipts is considered as presumed profit?
