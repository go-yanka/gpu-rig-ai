  - health care services are exempted
  - Mega Exemption
  must_not_say:
  - health care is in the negative list
  - both are in the negative list
  must_cite_verbatim: true
  notes: Trading of goods is under the Negative List (Sec 66D). Health care services were exempt via Mega Exemption Notification 25/2012-ST, not the Negative List.
- id: st_service_tax_007
  category: service_tax
  subcategory: service_tax
  difficulty: basic
  question: An executive received a non-compete fee in November 2016 for agreeing to the obligation to refrain from an act. Was this transaction treated as a service under the Finance Act 1994?
  expected_sections:
  - Section 66E Finance Act 1994
  expected_rules: []
  expected_notifications: []
  expected_conclusion_keywords:
  - declared service
  - agreeing to the obligation to refrain from an act
  - 'yes'
  must_not_say:
  - not a service
  - negative list
  must_cite_verbatim: true
  notes: Section 66E of the Finance Act 1994 explicitly listed 'agreeing to the obligation to refrain from an act' as a Declared Service.
- id: st_service_tax_008
  category: service_tax
  subcategory: service_tax
  difficulty: basic
  question: A registered manufacturing company utilized the services of a Goods Transport Agency (GTA) for road transport in December 2016. Under the Service Tax reverse charge notification, what percentage of the Service Tax liability was the manufacturing company required to pay?
  expected_sections:
  - Section 68(2) Finance Act 1994
  expected_rules: []
  expected_notifications:
  - 30/2012-ST
  expected_conclusion_keywords:
  - 100%
  - service receiver
  - full reverse charge
  must_not_say:
  - 50%
  - partial reverse charge
  - GTA pays the tax
  must_cite_verbatim: true
  notes: Under Notification 30/2012-ST, the service receiver (a specified corporate/registered entity) was liable to pay 100% of the Service Tax under reverse charge for GTA services.
- id: st_service_tax_009
  category: service_tax
  subcategory: service_tax
  difficulty: advanced
  question: An individual provided manpower supply services to a corporate entity in October 2016. What portion of the Service Tax liability did the corporate service receiver pay under reverse charge, and what was the applicable total Service Tax rate in effect at that time?
  expected_sections:
  - Section 68(2) Finance Act 1994
  expected_rules: []
  expected_notifications:
  - 30/2012-ST
  - 7/2015-ST
  expected_conclusion_keywords:
  - 100%
  - full reverse charge
  - service receiver pays the entire tax
  - 15%
  must_not_say:
  - 75%
  - 25%
  - partial reverse charge
  - 18%
  - 12.36%
  - 14%
  must_cite_verbatim: true
  notes: Manpower supply and security services were shifted from partial RCM (75/25) to 100% FULL RCM on the service receiver by Notification 7/2015-ST effective 01-Apr-2015 (amending Notif 30/2012-ST). By October 2016, it was full RCM. Effective ST rate was 15% (14% ST + 0.5% SBC + 0.5% KKC) from 01-Jun-2016 to 30-Jun-2017. Corrected from Gemini's 75/25 error.
- id: st_service_tax_010
  category: service_tax
  subcategory: service_tax
  difficulty: basic
  question: What was the abatement percentage allowed for Goods Transport Agency (GTA) services under the relevant 2012 notification, and what was the primary condition regarding CENVAT credit?
  expected_sections: []
