  expected_rules: []
  expected_notifications: []
  expected_conclusion_keywords:
  - Karnataka
  - IGST
  - inter-state
  must_not_say:
  - CGST and SGST
  - intra-state
  must_cite_verbatim: true
  notes: Vanilla inter-state goods — baseline sanity check.
