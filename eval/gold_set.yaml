  - taxable portion 30%
  - CENVAT fully allowed
  must_cite_verbatim: true
  notes: Under Notification 26/2012-ST, renting of a motor cab enjoyed a 60% abatement, meaning Service Tax was levied on 40% of the value, with restrictions on CENVAT credit.
- id: st_service_tax_012
  category: service_tax
  subcategory: service_tax
  difficulty: basic
  question: In March 2016, a service provider purchased capital goods for providing taxable services. Under the CENVAT Credit Rules, what was the maximum percentage of CENVAT credit on these capital goods that could be availed in the same financial year?
