  - determined according to the terms of the headings
  - Section or Chapter Notes
  must_not_say:
  - titles have legal force
  - titles override headings
  - titles determine classification
  must_cite_verbatim: true
  notes: GRI 1 states that titles of Sections, Chapters, and Sub-chapters are provided for ease of reference only; legally, classification is determined by the terms of headings and relevant Section or Chapter Notes.
- id: cust_customs_classification_004
  category: customs
  subcategory: customs_classification
  difficulty: intermediate
  question: A shipment of complete bicycles is imported entirely in a completely knocked down (CKD) condition for convenience of packing. How is this classified under the Customs Tariff?
  expected_sections: []
