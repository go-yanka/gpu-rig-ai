- id: gst_inverted_022
  category: gst
  subcategory: inverted
  difficulty: complex
  question: "A manufacturer operates under an inverted duty structure (inputs at 18%, output at 5%). They also incur heavy input service expenses (SAC 9983) taxed at 18%. Based on Rule 89(5), can they include the ITC on input services when calculating the maximum refund amount?"
  expected_sections: ["Section 54(3) CGST Act"]
  expected_rules: ["Rule 89(5) CGST Rules"]
  expected_notifications: []
  expected_conclusion_keywords: ["no", "excludes input services", "only inputs", "goods only"]
  must_not_say: ["yes", "includes input services", "can claim refund on services"]
  must_cite_verbatim: true
  notes: "Rule 89(5) formula specifically calculates refund based on 'Net ITC' which is defined to include only inputs (goods), explicitly excluding input services and capital goods."
- id: gst_ccy_supply_023
  category: gst
  subcategory: ccy_supply
  difficulty: complex
  question: "A residential boarding school charges a consolidated annual fee covering education (SAC 9992), accommodation (SAC 9963), and catering services (SAC 9963). While catering and accommodation are normally taxable, what is the GST treatment for this consolidated fee?"
  expected_sections: ["Section 8(a) CGST Act", "Section 2(30) CGST Act"]
  expected_rules: []
  expected_notifications: ["12/2017-CT(R)"]
  expected_conclusion_keywords: ["composite supply", "education is principal supply", "exempt entirely"]
  must_not_say: ["mixed supply", "taxable at 5%", "apportioned"]
  must_cite_verbatim: true
  notes: "This is a classic composite supply where education is the principal supply. Since education up to higher secondary is exempt, the entire bundled fee is exempt."
- id: customs_rate_024
