  expected_sections: ["Heading 9801 Customs Tariff"]
  expected_rules: []
  expected_notifications: []
  expected_conclusion_keywords: ["18% IGST", "standard rate", "does not apply per machinery"]
  must_not_say: ["exempt", "merit rate of individual machine", "5%"]
  must_cite_verbatim: true
  notes: "Under Project Import (9801), all items are classified under the single heading. While BCD is concessional, IGST is applied at a flat rate of 18% for the entire project import heading, regardless of individual machine merit rates."
- id: gst_notif_025
