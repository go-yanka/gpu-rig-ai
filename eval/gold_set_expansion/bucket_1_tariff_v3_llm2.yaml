- id: customs_rate_004
  category: customs
  subcategory: rate
  difficulty: complex
  question: "An importer registers a contract for setting up a power project under Project Imports (Heading 9801). They import turbines (merit BCD 7.5%) and specialized valves (merit BCD 15%). How are the BCD and IGST rates applied across these items under the Project Import Regulations?"
  expected_sections: ["Heading 9801 Customs Tariff"]
  expected_rules: ["Project Import Regulations, 1986"]
  expected_notifications: ["50/2017-Cus", "Notification number to verify"]
  expected_conclusion_keywords: ["flat concessional BCD", "all items under 9801", "merit rates ignored", "flat IGST 18%"]
  must_not_say: ["turbines at 7.5%", "valves at 15%", "merit rate applies"]
  must_cite_verbatim: true
  notes: "Under Project Imports, the entire plant and machinery imported under registered contracts are classified under heading 9801, attracting a uniform concessional BCD and a flat IGST rate (typically 18%), disregarding individual item merit rates."
- id: gst_notif_003
  category: gst
  subcategory: notif
  difficulty: complex
  question: "A transporter provides Goods Transport Agency (GTA) services (SAC 9965). Historically they paid 5% without ITC. Under the mechanism introduced by Notification 03/2022-CT(R), what are the rate and ITC options now available to a GTA for forward charge, and what declaration must be filed?"
  expected_sections: []
  expected_rules: []
  expected_notifications: ["03/2022-CT(R)", "11/2017-CT(R)"]
  expected_conclusion_keywords: ["option to pay 5% without ITC", "option to pay 12% with ITC", "forward charge", "Annexure V declaration"]
  must_not_say: ["only reverse charge", "18%", "ITC not allowed under 12%"]
  must_cite_verbatim: true
  notes: "The notification gave GTAs the option to pay under forward charge at either 5% (no ITC) or 12% (with ITC), requiring a specific annual declaration (Annexure V) to exercise the option."
