  question: "A retailer offers a Diwali gift hamper containing canned juice (12%), dry fruits (12%), and luxury chocolates (28%) for a single price of Rs. 2000. Is this a composite or mixed supply, and what GST rate must be charged on the invoice?"
  expected_sections: ["Section 2(74) CGST Act", "Section 8(b) CGST Act"]
  expected_rules: []
  expected_notifications: []
  expected_conclusion_keywords: ["mixed supply", "28%", "highest rate", "not naturally bundled"]
  must_not_say: ["composite supply", "12%", "apportioned rates"]
  must_cite_verbatim: true
