<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Rig - Model Testing</title>
<style>
  :root {
    --bg:     #0a0e14;  --bg2:    #0d1117;  --panel:  #161b22;
    --border: #21262d;  --text:   #e6edf3;  --dim:    #7d8590;
    --green:  #3fb950;  --yellow: #d29922;  --red:    #f85149;
    --blue:   #58a6ff;  --teal:   #39c5cf;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'SF Mono','Fira Code','Cascadia Code', monospace;
    font-size: 13px; margin: 0; min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg2); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  .header a { color: var(--dim); text-decoration: none; font-size: 12px; }
  .header a:hover { color: var(--text); }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
  .btn {
    padding: 8px 20px; border-radius: 6px; border: 1px solid;
    font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .8; } .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-green { background: rgba(63,185,80,.15); color: var(--green); border-color: rgba(63,185,80,.4); }
  .btn-red   { background: rgba(248,81,73,.15); color: var(--red); border-color: rgba(248,81,73,.4); }

  .log-area {
    background: #0d1117; border-radius: 6px; padding: 12px 14px;
    font-size: 11px; line-height: 1.7; max-height: 350px; overflow-y: auto;
    color: #8b949e; white-space: pre-wrap; word-break: break-all;
  }

  /* Results table */
  .results-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .results-table th {
    text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border);
    color: var(--dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
  }
  .results-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
  .results-table tr:hover td { background: rgba(255,255,255,.02); }

  .badge {
    padding: 1px 7px; border-radius: 12px; font-size: 11px; font-weight: 600;
    display: inline-block; letter-spacing: .03em;
  }
  .badge-pass   { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.3); }
  .badge-fail   { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid rgba(248,81,73,.3); }
  .badge-partial{ background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
  .badge-running{ background: rgba(88,166,255,.12); color: var(--blue);   border: 1px solid rgba(88,166,255,.25); }
  .badge-dim    { background: rgba(125,133,144,.1); color: var(--dim);    border: 1px solid rgba(125,133,144,.2); }

  /* Sub-test results */
  .test-detail { display: flex; gap: 6px; flex-wrap: wrap; }
  .test-pill {
    font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600;
  }
  .test-pill.pass { background: rgba(63,185,80,.1); color: var(--green); }
  .test-pill.fail { background: rgba(248,81,73,.1); color: var(--red); }

  .progress-bar { background: #21262d; border-radius: 4px; height: 6px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue), var(--teal)); transition: width .5s; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; }

  /* Expand row */
  .expand-row { display: none; }
  .expand-row.open { display: table-row; }
  .expand-cell { padding: 8px 10px 12px 30px; background: rgba(0,0,0,.2); font-size: 11px; color: var(--dim); }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:18px; font-weight:800;">AI Rig</span>
  <a href="/">Dashboard</a>
  <span style="color:var(--text); font-weight:600;">Testing</span>
</div>

<div style="padding: 20px; max-width: 1200px; margin: 0 auto;">

  <!-- Controls -->
  <div class="panel" style="padding: 16px; margin-bottom: 16px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
    <button class="btn btn-green" id="btn-run" onclick="runTests()">Run All Model Tests</button>
    <button class="btn btn-red" id="btn-stop" onclick="stopTests()" disabled>Stop</button>
    <span id="status-text" style="color:var(--dim);">Click "Run All Model Tests" to start. Tests each model: load, verify (4 prompts), unload.</span>
    <div style="flex:1;"></div>
    <span id="timer" style="color:var(--dim); font-size:12px;"></span>
  </div>

  <!-- Progress -->
  <div id="progress-panel" class="panel" style="padding:16px; margin-bottom:16px; display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <span id="progress-label" style="font-weight:600;">Loading...</span>
      <span id="progress-count" style="color:var(--dim); font-size:12px;">0 / 7</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%;"></div></div>
  </div>

  <!-- Results Table -->
  <div class="panel" style="padding:16px; margin-bottom:16px;">
    <div style="font-weight:700; font-size:14px; margin-bottom:12px;">Test Results</div>
    <table class="results-table" id="results-table">
      <thead>
        <tr>
          <th style="width:30px;">#</th>
          <th>Model</th>
          <th>Mode</th>
          <th>GPU</th>
          <th>Load Time</th>
          <th>Speed</th>
          <th>Tests</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="8" style="color:var(--dim); text-align:center; padding:30px;">No tests run yet</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Live Log -->
  <div class="panel" style="padding:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span style="font-weight:700; font-size:14px;">Live Output</span>
      <button class="btn" style="background:transparent;color:var(--dim);border-color:var(--border);font-size:11px;padding:3px 10px;" onclick="document.getElementById('log').textContent=''">Clear</button>
    </div>
    <div class="log-area" id="log"></div>
  </div>

</div>

<script>
let eventSource = null;
let timerInterval = null;
let startTime = null;
let results = [];

function log(msg, color) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (color) line.style.color = `var(--${color})`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    document.getElementById('timer').textContent = m > 0 ? `${m}m ${s%60}s` : `${s}s`;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
}

function setUI(running) {
  document.getElementById('btn-run').disabled = running;
  document.getElementById('btn-stop').disabled = !running;
  document.getElementById('progress-panel').style.display = running ? 'block' : 'none';
  document.getElementById('status-text').textContent = running
    ? 'Testing in progress... Each model is loaded, verified, then unloaded.'
    : 'Done. Click "Run All Model Tests" to re-run.';
}

function buildResultRow(i, r) {
  // Test badges
  let testBadges = '';
  if (r.tests && r.tests.length) {
    testBadges = r.tests.map(t =>
      `<span class="test-pill ${t.passed ? 'pass' : 'fail'}">${t.name} ${t.passed ? '\u2713' : '\u2717'}</span>`
    ).join(' ');
  }

  // Status badge
  let statusBadge = '';
  if (r.status === 'pass') statusBadge = '<span class="badge badge-pass">PASS</span>';
  else if (r.status === 'partial') statusBadge = '<span class="badge badge-partial">PARTIAL</span>';
  else if (r.status === 'timeout') statusBadge = '<span class="badge badge-fail">TIMEOUT</span>';
  else if (r.status === 'missing') statusBadge = '<span class="badge badge-fail">MISSING</span>';
  else if (r.status === 'launch_fail') statusBadge = '<span class="badge badge-fail">CRASH</span>';
  else statusBadge = `<span class="badge badge-dim">${r.status.toUpperCase()}</span>`;

  let row = `<tr onclick="toggleExpand(${i})" style="cursor:pointer;">
    <td>${i+1}</td>
    <td style="font-weight:600;">${r.name || '?'}</td>
    <td>${r.mode || '?'}</td>
    <td>GPU ${r.gpu}</td>
    <td>${r.load_time}s</td>
    <td>${r.speed > 0 ? r.speed + ' t/s' : '\u2014'}</td>
    <td><div class="test-detail">${testBadges || '\u2014'}</div></td>
    <td>${statusBadge}</td>
  </tr>`;

  // Expandable detail row
  let detail = '';
  if (r.tests && r.tests.length) {
    detail = r.tests.map(t => {
      const resp = (t.response || t.error || '').replace(/</g,'&lt;').substring(0, 150);
      return `<div style="margin-bottom:4px;">
        <span class="test-pill ${t.passed ? 'pass' : 'fail'}">${t.name}</span>
        <span style="margin-left:6px;">${t.speed} t/s, ${t.tokens} tok, ${t.elapsed}s</span>
        <div style="margin-left:12px; color:var(--dim);">${resp}</div>
      </div>`;
    }).join('');
  }
  if (r.error) detail += `<div style="color:var(--red);">Error: ${r.error}</div>`;

  row += `<tr class="expand-row" id="expand-${i}"><td colspan="8" class="expand-cell">${detail || 'No details'}</td></tr>`;
  return row;
}

function toggleExpand(i) {
  document.getElementById(`expand-${i}`).classList.toggle('open');
}

function renderTable() {
  const body = document.getElementById('results-body');
  if (results.length === 0) {
    body.innerHTML = '<tr><td colspan="8" style="color:var(--dim);text-align:center;padding:30px;">No tests run yet</td></tr>';
    return;
  }
  body.innerHTML = results.map((r, i) => buildResultRow(i, r)).join('');
}

function runTests() {
  results = [];
  renderTable();
  setUI(true);
  startTimer();
  log('Starting model tests...', 'blue');

  eventSource = new EventSource('/api/test/run');

  eventSource.onmessage = function(e) {
    const msg = JSON.parse(e.data);

    if (msg.type === 'start') {
      log(`Testing ${msg.total} model configurations`, 'blue');
    }
    else if (msg.type === 'loading') {
      document.getElementById('progress-label').innerHTML = `<span class="spinner"></span> Loading ${msg.label}...`;
      document.getElementById('progress-count').textContent = `${msg.step} / ${msg.total}`;
      document.getElementById('progress-fill').style.width = `${((msg.step - 0.5) / msg.total) * 100}%`;
      log(`[${msg.step}/${msg.total}] Loading ${msg.label}...`, 'yellow');

      // Add placeholder row
      results.push({name: msg.model, mode: msg.mode, gpu: msg.gpu, label: msg.label, status: 'loading', load_time: 0, speed: 0, tests: []});
      renderTable();
    }
    else if (msg.type === 'result') {
      // Replace placeholder with actual result
      results[msg.step - 1] = msg;
      renderTable();
      document.getElementById('progress-fill').style.width = `${(msg.step / msg.total) * 100}%`;
      document.getElementById('progress-count').textContent = `${msg.step} / ${msg.total}`;

      const icon = msg.status === 'pass' ? '\u2705' : msg.status === 'partial' ? '\u26a0\ufe0f' : '\u274c';
      log(`${icon} ${msg.label}: ${msg.status.toUpperCase()} | ${msg.load_time}s load | ${msg.speed} t/s | ${msg.tests.filter(t=>t.passed).length}/${msg.tests.length} tests`, msg.status === 'pass' ? 'green' : 'yellow');
    }
    else if (msg.type === 'done') {
      stopTimer();
      setUI(false);
      eventSource.close();
      eventSource = null;

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      log(`\nDone in ${Math.floor(elapsed/60)}m ${elapsed%60}s: ${msg.passed} passed, ${msg.partial} partial, ${msg.failed} failed out of ${msg.total}`, msg.failed === 0 ? 'green' : 'red');
      document.getElementById('status-text').textContent = `Done: ${msg.passed} passed, ${msg.partial} partial, ${msg.failed} failed (${Math.floor(elapsed/60)}m ${elapsed%60}s)`;
    }
  };

  eventSource.onerror = function() {
    stopTimer();
    setUI(false);
    log('Connection lost or test stopped.', 'red');
    if (eventSource) { eventSource.close(); eventSource = null; }
  };
}

function stopTests() {
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }
  stopTimer();
  setUI(false);
  log('Tests stopped by user.', 'red');
}
</script>
</body>
</html>
